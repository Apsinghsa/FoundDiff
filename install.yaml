name: founddiff
channels:
  - pytorch
  - nvidia/label/cuda-11.8.0
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.1.0
  - torchvision=0.16.0
  - numpy<2
  - scipy
  - scikit-image
  - matplotlib
  - pillow
  - pywavelets
  - lmdb
  - ninja
  - wheel
  - packaging
  - pip
  - pip:
    - einops
    - kornia
    - timm
    - accelerate
    - ema-pytorch==0.3.3
    - wandb
    - augmentor
    - opencv-python
    - pydicom
    - imageio
    - ipdb

# Note: causal-conv1d and mamba-ssm require pre-built wheels for your CUDA/Python version.
# Install them manually after creating the environment:
#   pip install causal-conv1d==1.2.2.post1 --no-build-isolation
#   pip install https://github.com/state-spaces/mamba/releases/download/v2.2.2/mamba_ssm-2.2.2+cu118torch2.1cxx11abiFalse-cp310-cp310-linux_x86_64.whl
#
# Or check https://github.com/state-spaces/mamba/releases for the correct wheel for your setup.